<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            max-width: 850px;
            margin: 0 auto;
            padding: 40px 20px;
            line-height: 1.6;
        }
        h1, h2, h3 { color: #58a6ff; }
        a { color: #58a6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        pre { 
            background: #161b22; 
            padding: 15px; 
            border-radius: 6px; 
            overflow-x: auto; 
            border: 1px solid #30363d;
        }
        code { font-family: "Courier New", Courier, monospace; font-size: 0.9em; }
        header { border-bottom: 1px solid #30363d; margin-bottom: 30px; padding-bottom: 20px; }
        .post-date { color: #8b949e; font-size: 0.9em; margin-right: 15px; }
    </style>
</head>
<body>
    <header>
        <h1><a href="/" style="color: #c9d1d9;">{{ site.title }}</a></h1>
        <p style="color: #8b949e;">{{ site.description }}</p>
        <nav style="margin-top: 15px;">
            <a href="/" style="margin-right: 15px; font-weight: bold;">Home</a>
            <a href="/tags.html" style="font-weight: bold;">Tags</a>
        </nav>
    </header>
    <main>
        {{ content }}
    </main>
</body>
</html>
