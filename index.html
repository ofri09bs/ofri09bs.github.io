---
layout: default
---
<h2>Recent Posts</h2>
<ul style="list-style-type: none; padding-left: 0;">
  {% for post in site.posts %}
    <li style="margin-bottom: 10px;">
      <span class="post-date">{{ post.date | date: "%B %d, %Y" }}</span>
      <a href="{{ post.url }}">{{ post.title }}</a>
    </li>
  {% endfor %}
</ul>
